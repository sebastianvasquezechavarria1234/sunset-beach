<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sunset Beach</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      transition: opacity 1.2s ease, visibility 1.2s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    #loading-bar {
      width: 200px;
      height: 2px;
      background: rgba(255,255,255,0.1);
      border-radius: 1px;
      overflow: hidden;
      margin-top: 24px;
    }

    #loading-bar-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #ff8a4c, #ffd97d);
      transition: width 0.3s ease;
    }

    #loading-text {
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 16px;
    }

    .title-overlay {
      position: fixed;
      bottom: 60px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 10;
      pointer-events: none;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 2s ease 0.5s, transform 2s ease 0.5s;
    }

    .title-overlay.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .title-overlay h1 {
      color: rgba(255,255,255,0.85);
      font-size: clamp(24px, 4vw, 48px);
      font-weight: 300;
      letter-spacing: 8px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .title-overlay p {
      color: rgba(255,255,255,0.4);
      font-size: clamp(10px, 1.2vw, 14px);
      letter-spacing: 6px;
      text-transform: uppercase;
    }
  </style>
  <script type="module" crossorigin src="/assets/index-Cl1Nn-5B.js"></script>
</head>
<body>
  <div id="loading-screen">
    <div id="loading-bar">
      <div id="loading-bar-fill"></div>
    </div>
    <div id="loading-text">Cargando experiencia</div>
  </div>

  <div class="title-overlay" id="title-overlay">
    <h1>Sunset Beach</h1>
    <p>Atardecer en la playa</p>
  </div>

</body>
</html>
